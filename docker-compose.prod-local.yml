# Local-only overrides for scripts/prod-local.sh.
# Keeps docker-compose.prod.yml production-oriented while giving local prod-like
# runs a disposable SMTP inbox for confirmation and password-reset emails.

services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: legi-mailpit
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MAILPIT_HTTP_PORT:-8025}:8025"
    networks:
      - legi-network

  identity-api:
    environment:
      Smtp__Username: ""
      Smtp__Password: ""
    depends_on:
      mailpit:
        condition: service_started
