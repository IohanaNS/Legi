# =============================================================================
# BukiHub — PRODUCTION compose.
#
# Hardened counterpart to docker-compose.yml (which is DEV ONLY).
# Differences from dev, by design:
#   * ASPNETCORE_ENVIRONMENT=Production  -> HTTPS redirect on, Swagger off,
#     refresh-token cookie gets its Secure flag.
#   * No infrastructure ports published. Databases, RabbitMQ and MinIO are
#     reachable only on the internal Docker network. The ONLY published port is
#     the web tier, bound to loopback so a host TLS reverse proxy fronts it.
#   * Every secret is REQUIRED (${VAR:?...}). The stack refuses to start with a
#     missing or empty secret instead of falling back to a dev default.
#   * Containers run non-root (APIs via Dockerfile), drop all Linux capabilities,
#     forbid privilege escalation, use a read-only root filesystem where possible,
#     and have CPU/memory limits to bound a single-request DoS.
#
# Usage:
#   cp .env.prod.example .env.prod && edit .env.prod   (fill every value)
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
#
# Put a TLS-terminating reverse proxy (Caddy/Traefik/nginx) on the host in front
# of 127.0.0.1:${WEB_HTTP_PORT}. See Docs/DEPLOYMENT-hardening.md.
# =============================================================================

# ---- Reusable hardening blocks ----------------------------------------------
x-api-hardening: &api-hardening
  restart: unless-stopped
  read_only: true
  tmpfs:
    - /tmp
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 512M

x-infra-hardening: &infra-hardening
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true

# Postgres TLS: an entrypoint wrapper installs the host-mounted cert/key with the
# perms Postgres requires, then enables `ssl=on`. The APIs connect with
# `SSL Mode=Require;Trust Server Certificate=true` (see each ConnectionStrings__*),
# encrypting inter-container DB traffic. Generate the cert once with
# `./db/tls/gen-db-certs.sh`. See Docs/DEPLOYMENT-hardening.md §6.
x-pg-tls: &pg-tls
  entrypoint: ["/usr/local/bin/pg-tls-entrypoint.sh"]

x-api-env: &api-jwt-env
  ASPNETCORE_ENVIRONMENT: Production
  # Forwarded headers are handled explicitly in each API's Program.cs (trusting only
  # the private proxy networks), so the real client IP drives rate limiting, login
  # lockout and Turnstile. Do NOT set ASPNETCORE_FORWARDEDHEADERS_ENABLED here — it
  # would register the middleware a second time and double-strip X-Forwarded-For.
  # If your Docker bridge subnet isn't in 10/8, 172.16/12 or 192.168/16, set
  # ForwardedHeaders__KnownNetworks__0 to its CIDR. See Docs/DEPLOYMENT-hardening.md.
  # Secrets (Jwt__PublicKey, RabbitMq__Password, ConnectionStrings__*, Storage keys,
  # Mfa/Turnstile/Smtp) are delivered as Docker secrets under /run/secrets and read
  # via AddKeyPerFile in each Program.cs — NOT as env vars. See §6 / ./secrets.
  Jwt__Issuer: ${Jwt__Issuer:?Jwt__Issuer is required}
  Jwt__Audience: ${Jwt__Audience:?Jwt__Audience is required}
  Jwt__AccessTokenExpirationMinutes: ${Jwt__AccessTokenExpirationMinutes:-15}
  Jwt__RefreshTokenExpirationDays: ${Jwt__RefreshTokenExpirationDays:-7}
  RabbitMq__Host: rabbitmq
  RabbitMq__Port: 5672
  RabbitMq__VirtualHost: /
  RabbitMq__Username: ${RabbitMq__Username:?RabbitMq__Username is required}

services:
  # ---- Databases (internal only — no published ports) -----------------------
  identity-db:
    <<: [*infra-hardening, *pg-tls]
    image: postgres:16-alpine
    container_name: legi-identity-db
    environment:
      # Bootstrap superuser — used only to create the app role on first init; the
      # application never connects with it.
      POSTGRES_USER: ${IDENTITY_DB_ADMIN_USER:?IDENTITY_DB_ADMIN_USER is required}
      POSTGRES_PASSWORD_FILE: /run/secrets/identity_db_admin_password
      POSTGRES_DB: ${IDENTITY_DB_NAME:-legi_identity}
      # Non-superuser role the API actually uses at runtime (created by the init script).
      APP_DB_USER: ${IDENTITY_DB_USER:?IDENTITY_DB_USER is required}
      APP_DB_PASSWORD_FILE: /run/secrets/identity_db_app_password
    secrets:
      - identity_db_admin_password
      - identity_db_app_password
    volumes:
      - identity_db_data:/var/lib/postgresql/data
      - ./db/init/create-app-role.sh:/docker-entrypoint-initdb.d/10-create-app-role.sh:ro
      - ./db/tls/pg-tls-entrypoint.sh:/usr/local/bin/pg-tls-entrypoint.sh:ro
      - ./db/tls/server.crt:/etc/postgres-tls/server.crt:ro
      - ./db/tls/server.key:/etc/postgres-tls/server.key:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IDENTITY_DB_ADMIN_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - legi-network

  catalog-db:
    <<: [*infra-hardening, *pg-tls]
    image: postgres:16-alpine
    container_name: legi-catalog-db
    environment:
      # Bootstrap superuser — used only to create the app role on first init; the
      # application never connects with it.
      POSTGRES_USER: ${CATALOG_DB_ADMIN_USER:?CATALOG_DB_ADMIN_USER is required}
      POSTGRES_PASSWORD_FILE: /run/secrets/catalog_db_admin_password
      POSTGRES_DB: ${CATALOG_DB_NAME:-legi_catalog}
      # Non-superuser role the API actually uses at runtime (created by the init script).
      APP_DB_USER: ${CATALOG_DB_USER:?CATALOG_DB_USER is required}
      APP_DB_PASSWORD_FILE: /run/secrets/catalog_db_app_password
    secrets:
      - catalog_db_admin_password
      - catalog_db_app_password
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
      - ./db/init/create-app-role.sh:/docker-entrypoint-initdb.d/10-create-app-role.sh:ro
      - ./db/tls/pg-tls-entrypoint.sh:/usr/local/bin/pg-tls-entrypoint.sh:ro
      - ./db/tls/server.crt:/etc/postgres-tls/server.crt:ro
      - ./db/tls/server.key:/etc/postgres-tls/server.key:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_DB_ADMIN_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - legi-network

  library-db:
    <<: [*infra-hardening, *pg-tls]
    image: postgres:16-alpine
    container_name: legi-library-db
    environment:
      # Bootstrap superuser — used only to create the app role on first init; the
      # application never connects with it.
      POSTGRES_USER: ${LIBRARY_DB_ADMIN_USER:?LIBRARY_DB_ADMIN_USER is required}
      POSTGRES_PASSWORD_FILE: /run/secrets/library_db_admin_password
      POSTGRES_DB: ${LIBRARY_DB_NAME:-legi_library}
      # Non-superuser role the API actually uses at runtime (created by the init script).
      APP_DB_USER: ${LIBRARY_DB_USER:?LIBRARY_DB_USER is required}
      APP_DB_PASSWORD_FILE: /run/secrets/library_db_app_password
    secrets:
      - library_db_admin_password
      - library_db_app_password
    volumes:
      - library_db_data:/var/lib/postgresql/data
      - ./db/init/create-app-role.sh:/docker-entrypoint-initdb.d/10-create-app-role.sh:ro
      - ./db/tls/pg-tls-entrypoint.sh:/usr/local/bin/pg-tls-entrypoint.sh:ro
      - ./db/tls/server.crt:/etc/postgres-tls/server.crt:ro
      - ./db/tls/server.key:/etc/postgres-tls/server.key:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LIBRARY_DB_ADMIN_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - legi-network

  social-db:
    <<: [*infra-hardening, *pg-tls]
    image: postgres:16-alpine
    container_name: legi-social-db
    environment:
      # Bootstrap superuser — used only to create the app role on first init; the
      # application never connects with it.
      POSTGRES_USER: ${SOCIAL_DB_ADMIN_USER:?SOCIAL_DB_ADMIN_USER is required}
      POSTGRES_PASSWORD_FILE: /run/secrets/social_db_admin_password
      POSTGRES_DB: ${SOCIAL_DB_NAME:-legi_social}
      # Non-superuser role the API actually uses at runtime (created by the init script).
      APP_DB_USER: ${SOCIAL_DB_USER:?SOCIAL_DB_USER is required}
      APP_DB_PASSWORD_FILE: /run/secrets/social_db_app_password
    secrets:
      - social_db_admin_password
      - social_db_app_password
    volumes:
      - social_db_data:/var/lib/postgresql/data
      - ./db/init/create-app-role.sh:/docker-entrypoint-initdb.d/10-create-app-role.sh:ro
      - ./db/tls/pg-tls-entrypoint.sh:/usr/local/bin/pg-tls-entrypoint.sh:ro
      - ./db/tls/server.crt:/etc/postgres-tls/server.crt:ro
      - ./db/tls/server.key:/etc/postgres-tls/server.key:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SOCIAL_DB_ADMIN_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - legi-network

  # ---- Message broker (internal only — management UI NOT exposed) -----------
  rabbitmq:
    <<: *infra-hardening
    image: rabbitmq:4-management-alpine
    container_name: legi-rabbitmq
    # RabbitMQ 4.x rejects RABBITMQ_DEFAULT_PASS_FILE (removed). A wrapper reads the
    # password secret into plain RABBITMQ_DEFAULT_PASS instead — see the script.
    entrypoint: ["/usr/local/bin/secret-entrypoint.sh"]
    environment:
      RABBITMQ_DEFAULT_USER: ${RabbitMq__Username:?RabbitMq__Username is required}
      RABBITMQ_DEFAULT_VHOST: /
    secrets:
      - RabbitMq__Password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/secret-entrypoint.sh:/usr/local/bin/secret-entrypoint.sh:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - legi-network

  # ---- Object storage (internal only — fronted by nginx /media and /covers) -
  minio:
    <<: *infra-hardening
    image: minio/minio:latest
    container_name: legi-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/Storage__AccessKey
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/Storage__SecretKey
    secrets:
      - Storage__AccessKey
      - Storage__SecretKey
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - legi-network

  minio-init:
    image: minio/mc:latest
    container_name: legi-minio-init
    depends_on:
      minio:
        condition: service_healthy
    # Credentials come from Docker secrets ($$ escapes the $ so the shell — not
    # Compose — reads the files at runtime). Bucket names are non-secret env.
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$(cat /run/secrets/Storage__AccessKey) $$(cat /run/secrets/Storage__SecretKey);
      mc mb --ignore-existing local/${Storage__Bucket:-legi-media};
      mc anonymous set download local/${Storage__Bucket:-legi-media};
      mc mb --ignore-existing local/${Storage__CoversBucket:-legi-covers};
      mc anonymous set download local/${Storage__CoversBucket:-legi-covers};
      "
    secrets:
      - Storage__AccessKey
      - Storage__SecretKey
    networks:
      - legi-network

  # ---- APIs (non-root, cap-dropped, read-only rootfs, resource-limited) ------
  identity-api:
    <<: *api-hardening
    build:
      context: .
      dockerfile: src/Legi.Identity.Api/Dockerfile
    container_name: legi-identity-api
    environment:
      <<: *api-jwt-env
      # Jwt__PrivateKey (mints tokens — Identity ONLY), Jwt__PublicKey, Mfa__EncryptionKey
      # (encrypts TOTP secrets at rest), ConnectionStrings__IdentityDb, RabbitMq__Password,
      # Turnstile__SecretKey and Smtp__Password are all delivered via Docker secrets
      # (see the `secrets:` list below + the top-level `secrets:` block).
      Turnstile__Enabled: ${Turnstile__Enabled:-true}
      Turnstile__SiteVerifyUrl: ${Turnstile__SiteVerifyUrl:-https://challenges.cloudflare.com/turnstile/v0/siteverify}
      Turnstile__AllowedHostnames__0: ${Turnstile__AllowedHostnames__0:?Turnstile__AllowedHostnames__0 is required (your public hostname)}
      Turnstile__RequireForRegistration: ${Turnstile__RequireForRegistration:-true}
      Turnstile__LoginFailedAttemptsBeforeRequired: ${Turnstile__LoginFailedAttemptsBeforeRequired:-2}
      Turnstile__RequireForPasswordReset: ${Turnstile__RequireForPasswordReset:-true}
      GoogleAuth__ClientId: ${GoogleAuth__ClientId:-}
      PasswordReset__FrontendBaseUrl: ${PasswordReset__FrontendBaseUrl:?PasswordReset__FrontendBaseUrl is required (https://yourdomain)}
      PasswordReset__TokenLifetimeMinutes: ${PasswordReset__TokenLifetimeMinutes:-60}
      EmailConfirmation__FrontendBaseUrl: ${EmailConfirmation__FrontendBaseUrl:?EmailConfirmation__FrontendBaseUrl is required (https://yourdomain)}
      EmailConfirmation__TokenLifetimeMinutes: ${EmailConfirmation__TokenLifetimeMinutes:-1440}
      Smtp__Host: ${Smtp__Host:?Smtp__Host is required in production}
      Smtp__Port: ${Smtp__Port:-587}
      Smtp__Username: ${Smtp__Username:?Smtp__Username is required}
      Smtp__FromAddress: ${Smtp__FromAddress:?Smtp__FromAddress is required}
      Smtp__FromName: ${Smtp__FromName:-BukiHub}
      Smtp__UseStartTls: ${Smtp__UseStartTls:-true}
      RabbitMq__ClientProvidedName: legi-identity
    secrets:
      - Jwt__PublicKey
      - Jwt__PrivateKey
      - Mfa__EncryptionKey
      - ConnectionStrings__IdentityDb
      - RabbitMq__Password
      - Turnstile__SecretKey
      - Smtp__Password
    depends_on:
      identity-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - legi-network

  catalog-api:
    <<: *api-hardening
    build:
      context: .
      dockerfile: src/Legi.Catalog.Api/Dockerfile
    container_name: legi-catalog-api
    environment:
      <<: *api-jwt-env
      # ConnectionStrings__CatalogDatabase, RabbitMq__Password and the Storage keys
      # arrive via Docker secrets (see the `secrets:` list below).
      ExternalServices__GoogleBooks__Enabled: ${ExternalServices__GoogleBooks__Enabled:-true}
      ExternalServices__GoogleBooks__ApiKey: ${ExternalServices__GoogleBooks__ApiKey:-}
      Storage__Endpoint: http://minio:9000
      Storage__Bucket: ${Storage__CoversBucket:-legi-covers}
      Storage__PublicBasePath: /covers
      RabbitMq__ClientProvidedName: legi-catalog
    secrets:
      - Jwt__PublicKey
      - ConnectionStrings__CatalogDatabase
      - RabbitMq__Password
      - Storage__AccessKey
      - Storage__SecretKey
    depends_on:
      catalog-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - legi-network

  library-api:
    <<: *api-hardening
    build:
      context: .
      dockerfile: src/Legi.Library.Api/Dockerfile
    container_name: legi-library-api
    environment:
      <<: *api-jwt-env
      # ConnectionStrings__LibraryDatabase and RabbitMq__Password arrive via Docker secrets.
      RabbitMq__ClientProvidedName: legi-library
    secrets:
      - Jwt__PublicKey
      - ConnectionStrings__LibraryDatabase
      - RabbitMq__Password
    depends_on:
      library-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - legi-network

  social-api:
    <<: *api-hardening
    build:
      context: .
      dockerfile: src/Legi.Social.Api/Dockerfile
    container_name: legi-social-api
    environment:
      <<: *api-jwt-env
      # ConnectionStrings__SocialDatabase, RabbitMq__Password and the Storage keys
      # arrive via Docker secrets (see the `secrets:` list below).
      Storage__Endpoint: http://minio:9000
      Storage__Bucket: ${Storage__Bucket:-legi-media}
      Storage__PublicBasePath: /media
      RabbitMq__ClientProvidedName: legi-social
    secrets:
      - Jwt__PublicKey
      - ConnectionStrings__SocialDatabase
      - RabbitMq__Password
      - Storage__AccessKey
      - Storage__SecretKey
    depends_on:
      social-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - legi-network

  # ---- Web tier (the ONLY published port — bind to loopback, TLS proxy fronts it)
  web:
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    build:
      context: web/legi-web
      dockerfile: Dockerfile
      args:
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: legi-web
    ports:
      - "127.0.0.1:${WEB_HTTP_PORT:-8080}:80"
    depends_on:
      - identity-api
      - catalog-api
      - library-api
      - social-api
      - minio
    networks:
      - legi-network

volumes:
  identity_db_data:
  catalog_db_data:
  library_db_data:
  social_db_data:
  rabbitmq_data:
  minio_data:

# ---- Docker secrets --------------------------------------------------------
# File-based secrets (non-Swarm Compose): each value is a file under ./secrets,
# bind-mounted read-only into /run/secrets/<name> in the services that need it.
# Unlike env vars they are NOT visible in `docker inspect` or /proc/<pid>/environ.
# Populate ./secrets with `./scripts/gen-prod-secrets.sh` (auto-generates the
# random ones, leaves placeholders for Turnstile/SMTP). The directory is gitignored.
# Names with `__` map to .NET config keys via AddKeyPerFile (Jwt__PublicKey ->
# Jwt:PublicKey); the lowercase *_db_*_password files are read by the DB containers.
secrets:
  Jwt__PublicKey:
    file: ./secrets/Jwt__PublicKey
  Jwt__PrivateKey:
    file: ./secrets/Jwt__PrivateKey
  Mfa__EncryptionKey:
    file: ./secrets/Mfa__EncryptionKey
  ConnectionStrings__IdentityDb:
    file: ./secrets/ConnectionStrings__IdentityDb
  ConnectionStrings__CatalogDatabase:
    file: ./secrets/ConnectionStrings__CatalogDatabase
  ConnectionStrings__LibraryDatabase:
    file: ./secrets/ConnectionStrings__LibraryDatabase
  ConnectionStrings__SocialDatabase:
    file: ./secrets/ConnectionStrings__SocialDatabase
  identity_db_admin_password:
    file: ./secrets/identity_db_admin_password
  identity_db_app_password:
    file: ./secrets/identity_db_app_password
  catalog_db_admin_password:
    file: ./secrets/catalog_db_admin_password
  catalog_db_app_password:
    file: ./secrets/catalog_db_app_password
  library_db_admin_password:
    file: ./secrets/library_db_admin_password
  library_db_app_password:
    file: ./secrets/library_db_app_password
  social_db_admin_password:
    file: ./secrets/social_db_admin_password
  social_db_app_password:
    file: ./secrets/social_db_app_password
  RabbitMq__Password:
    file: ./secrets/RabbitMq__Password
  Storage__AccessKey:
    file: ./secrets/Storage__AccessKey
  Storage__SecretKey:
    file: ./secrets/Storage__SecretKey
  Turnstile__SecretKey:
    file: ./secrets/Turnstile__SecretKey
  Smtp__Password:
    file: ./secrets/Smtp__Password

networks:
  legi-network:
    driver: bridge
