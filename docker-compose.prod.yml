# =============================================================================
# BukiHub — PRODUCTION compose.
#
# Hardened counterpart to docker-compose.yml (which is DEV ONLY).
# Differences from dev, by design:
#   * ASPNETCORE_ENVIRONMENT=Production  -> HTTPS redirect on, Swagger off,
#     refresh-token cookie gets its Secure flag.
#   * No infrastructure ports published. Databases, RabbitMQ and MinIO are
#     reachable only on the internal Docker network. The ONLY published port is
#     the web tier, bound to loopback so a host TLS reverse proxy fronts it.
#   * Every secret is REQUIRED (${VAR:?...}). The stack refuses to start with a
#     missing or empty secret instead of falling back to a dev default.
#   * Containers run non-root (APIs via Dockerfile), drop all Linux capabilities,
#     forbid privilege escalation, use a read-only root filesystem where possible,
#     and have CPU/memory limits to bound a single-request DoS.
#
# Usage:
#   cp .env.prod.example .env.prod && edit .env.prod   (fill every value)
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
#
# Put a TLS-terminating reverse proxy (Caddy/Traefik/nginx) on the host in front
# of 127.0.0.1:${WEB_HTTP_PORT}. See Docs/DEPLOYMENT-hardening.md.
# =============================================================================

# ---- Reusable hardening blocks ----------------------------------------------
x-api-hardening: &api-hardening
  restart: unless-stopped
  read_only: true
  tmpfs:
    - /tmp
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 512M

x-infra-hardening: &infra-hardening
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true

x-api-env: &api-jwt-env
  ASPNETCORE_ENVIRONMENT: Production
  # Forwarded headers are handled explicitly in each API's Program.cs (trusting only
  # the private proxy networks), so the real client IP drives rate limiting, login
  # lockout and Turnstile. Do NOT set ASPNETCORE_FORWARDEDHEADERS_ENABLED here — it
  # would register the middleware a second time and double-strip X-Forwarded-For.
  # If your Docker bridge subnet isn't in 10/8, 172.16/12 or 192.168/16, set
  # ForwardedHeaders__KnownNetworks__0 to its CIDR. See Docs/DEPLOYMENT-hardening.md.
  # Public key — every service needs it to validate tokens (shared via this anchor).
  Jwt__PublicKey: ${Jwt__PublicKey:?Jwt__PublicKey is required}
  Jwt__Issuer: ${Jwt__Issuer:?Jwt__Issuer is required}
  Jwt__Audience: ${Jwt__Audience:?Jwt__Audience is required}
  Jwt__AccessTokenExpirationMinutes: ${Jwt__AccessTokenExpirationMinutes:-15}
  Jwt__RefreshTokenExpirationDays: ${Jwt__RefreshTokenExpirationDays:-7}
  RabbitMq__Host: rabbitmq
  RabbitMq__Port: 5672
  RabbitMq__VirtualHost: /
  RabbitMq__Username: ${RabbitMq__Username:?RabbitMq__Username is required}
  RabbitMq__Password: ${RabbitMq__Password:?RabbitMq__Password is required}

services:
  # ---- Databases (internal only — no published ports) -----------------------
  identity-db:
    <<: *infra-hardening
    image: postgres:16-alpine
    container_name: legi-identity-db
    environment:
      POSTGRES_USER: ${IDENTITY_DB_USER:?IDENTITY_DB_USER is required}
      POSTGRES_PASSWORD: ${IDENTITY_DB_PASSWORD:?IDENTITY_DB_PASSWORD is required}
      POSTGRES_DB: ${IDENTITY_DB_NAME:-legi_identity}
    volumes:
      - identity_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IDENTITY_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - legi-network

  catalog-db:
    <<: *infra-hardening
    image: postgres:16-alpine
    container_name: legi-catalog-db
    environment:
      POSTGRES_USER: ${CATALOG_DB_USER:?CATALOG_DB_USER is required}
      POSTGRES_PASSWORD: ${CATALOG_DB_PASSWORD:?CATALOG_DB_PASSWORD is required}
      POSTGRES_DB: ${CATALOG_DB_NAME:-legi_catalog}
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - legi-network

  library-db:
    <<: *infra-hardening
    image: postgres:16-alpine
    container_name: legi-library-db
    environment:
      POSTGRES_USER: ${LIBRARY_DB_USER:?LIBRARY_DB_USER is required}
      POSTGRES_PASSWORD: ${LIBRARY_DB_PASSWORD:?LIBRARY_DB_PASSWORD is required}
      POSTGRES_DB: ${LIBRARY_DB_NAME:-legi_library}
    volumes:
      - library_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LIBRARY_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - legi-network

  social-db:
    <<: *infra-hardening
    image: postgres:16-alpine
    container_name: legi-social-db
    environment:
      POSTGRES_USER: ${SOCIAL_DB_USER:?SOCIAL_DB_USER is required}
      POSTGRES_PASSWORD: ${SOCIAL_DB_PASSWORD:?SOCIAL_DB_PASSWORD is required}
      POSTGRES_DB: ${SOCIAL_DB_NAME:-legi_social}
    volumes:
      - social_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SOCIAL_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - legi-network

  # ---- Message broker (internal only — management UI NOT exposed) -----------
  rabbitmq:
    <<: *infra-hardening
    image: rabbitmq:4-management-alpine
    container_name: legi-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RabbitMq__Username:?RabbitMq__Username is required}
      RABBITMQ_DEFAULT_PASS: ${RabbitMq__Password:?RabbitMq__Password is required}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - legi-network

  # ---- Object storage (internal only — fronted by nginx /media and /covers) -
  minio:
    <<: *infra-hardening
    image: minio/minio:latest
    container_name: legi-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${Storage__AccessKey:?Storage__AccessKey is required}
      MINIO_ROOT_PASSWORD: ${Storage__SecretKey:?Storage__SecretKey is required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - legi-network

  minio-init:
    image: minio/mc:latest
    container_name: legi-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${Storage__AccessKey} ${Storage__SecretKey};
      mc mb --ignore-existing local/${Storage__Bucket:-legi-media};
      mc anonymous set download local/${Storage__Bucket:-legi-media};
      mc mb --ignore-existing local/${Storage__CoversBucket:-legi-covers};
      mc anonymous set download local/${Storage__CoversBucket:-legi-covers};
      "
    networks:
      - legi-network

  # ---- APIs (non-root, cap-dropped, read-only rootfs, resource-limited) ------
  identity-api:
    <<: *api-hardening
    build:
      context: .
      dockerfile: src/Legi.Identity.Api/Dockerfile
    container_name: legi-identity-api
    environment:
      <<: *api-jwt-env
      # Private signing key — ONLY Identity holds it (it mints tokens). The other
      # services get just the public key and can validate but never forge a token.
      Jwt__PrivateKey: ${Jwt__PrivateKey:?Jwt__PrivateKey is required (Identity only)}
      ConnectionStrings__IdentityDb: Host=identity-db;Port=5432;Database=${IDENTITY_DB_NAME:-legi_identity};Username=${IDENTITY_DB_USER};Password=${IDENTITY_DB_PASSWORD}
      Turnstile__Enabled: ${Turnstile__Enabled:-true}
      Turnstile__SecretKey: ${Turnstile__SecretKey:?Turnstile__SecretKey is required (or set Turnstile__Enabled=false)}
      Turnstile__SiteVerifyUrl: ${Turnstile__SiteVerifyUrl:-https://challenges.cloudflare.com/turnstile/v0/siteverify}
      Turnstile__AllowedHostnames__0: ${Turnstile__AllowedHostnames__0:?Turnstile__AllowedHostnames__0 is required (your public hostname)}
      Turnstile__RequireForRegistration: ${Turnstile__RequireForRegistration:-true}
      Turnstile__LoginFailedAttemptsBeforeRequired: ${Turnstile__LoginFailedAttemptsBeforeRequired:-2}
      Turnstile__RequireForPasswordReset: ${Turnstile__RequireForPasswordReset:-true}
      GoogleAuth__ClientId: ${GoogleAuth__ClientId:-}
      PasswordReset__FrontendBaseUrl: ${PasswordReset__FrontendBaseUrl:?PasswordReset__FrontendBaseUrl is required (https://yourdomain)}
      PasswordReset__TokenLifetimeMinutes: ${PasswordReset__TokenLifetimeMinutes:-60}
      Smtp__Host: ${Smtp__Host:?Smtp__Host is required in production}
      Smtp__Port: ${Smtp__Port:-587}
      Smtp__Username: ${Smtp__Username:?Smtp__Username is required}
      Smtp__Password: ${Smtp__Password:?Smtp__Password is required}
      Smtp__FromAddress: ${Smtp__FromAddress:?Smtp__FromAddress is required}
      Smtp__FromName: ${Smtp__FromName:-BukiHub}
      Smtp__UseStartTls: ${Smtp__UseStartTls:-true}
      RabbitMq__ClientProvidedName: legi-identity
    depends_on:
      identity-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - legi-network

  catalog-api:
    <<: *api-hardening
    build:
      context: .
      dockerfile: src/Legi.Catalog.Api/Dockerfile
    container_name: legi-catalog-api
    environment:
      <<: *api-jwt-env
      ConnectionStrings__CatalogDatabase: Host=catalog-db;Port=5432;Database=${CATALOG_DB_NAME:-legi_catalog};Username=${CATALOG_DB_USER};Password=${CATALOG_DB_PASSWORD}
      ExternalServices__GoogleBooks__Enabled: ${ExternalServices__GoogleBooks__Enabled:-true}
      ExternalServices__GoogleBooks__ApiKey: ${ExternalServices__GoogleBooks__ApiKey:-}
      Storage__Endpoint: http://minio:9000
      Storage__Bucket: ${Storage__CoversBucket:-legi-covers}
      Storage__AccessKey: ${Storage__AccessKey}
      Storage__SecretKey: ${Storage__SecretKey}
      Storage__PublicBasePath: /covers
      RabbitMq__ClientProvidedName: legi-catalog
    depends_on:
      catalog-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - legi-network

  library-api:
    <<: *api-hardening
    build:
      context: .
      dockerfile: src/Legi.Library.Api/Dockerfile
    container_name: legi-library-api
    environment:
      <<: *api-jwt-env
      ConnectionStrings__LibraryDatabase: Host=library-db;Port=5432;Database=${LIBRARY_DB_NAME:-legi_library};Username=${LIBRARY_DB_USER};Password=${LIBRARY_DB_PASSWORD}
      RabbitMq__ClientProvidedName: legi-library
    depends_on:
      library-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - legi-network

  social-api:
    <<: *api-hardening
    build:
      context: .
      dockerfile: src/Legi.Social.Api/Dockerfile
    container_name: legi-social-api
    environment:
      <<: *api-jwt-env
      ConnectionStrings__SocialDatabase: Host=social-db;Port=5432;Database=${SOCIAL_DB_NAME:-legi_social};Username=${SOCIAL_DB_USER};Password=${SOCIAL_DB_PASSWORD}
      Storage__Endpoint: http://minio:9000
      Storage__Bucket: ${Storage__Bucket:-legi-media}
      Storage__AccessKey: ${Storage__AccessKey}
      Storage__SecretKey: ${Storage__SecretKey}
      Storage__PublicBasePath: /media
      RabbitMq__ClientProvidedName: legi-social
    depends_on:
      social-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - legi-network

  # ---- Web tier (the ONLY published port — bind to loopback, TLS proxy fronts it)
  web:
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    build:
      context: web/legi-web
      dockerfile: Dockerfile
      args:
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: legi-web
    ports:
      - "127.0.0.1:${WEB_HTTP_PORT:-8080}:80"
    depends_on:
      - identity-api
      - catalog-api
      - library-api
      - social-api
      - minio
    networks:
      - legi-network

volumes:
  identity_db_data:
  catalog_db_data:
  library_db_data:
  social_db_data:
  rabbitmq_data:
  minio_data:

networks:
  legi-network:
    driver: bridge
