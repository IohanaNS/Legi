name: Security

on:
  push:
    branches: [master]
  pull_request:
  # Weekly run catches newly-disclosed CVEs in dependencies that were clean at merge.
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Vulnerable NuGet packages ------------------------------------------------
  # `dotnet list --vulnerable` exits 0 even when it finds vulnerabilities, so we
  # parse its output and fail explicitly.
  dotnet-vulnerable:
    name: NuGet vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Legi.sln

      - name: Scan for vulnerable & deprecated packages
        run: |
          dotnet list Legi.sln package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          if grep -q "has the following vulnerable packages" vuln.txt; then
            echo "::error::Vulnerable NuGet packages detected (see log above)."
            exit 1
          fi
          echo "No vulnerable NuGet packages."

  # Frontend (yarn.lock) dependency CVEs are covered by the Trivy filesystem scan
  # below, which reads yarn.lock against the GitHub Advisory DB.

  # --- Secret scanning (full history) ------------------------------------------
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # scan the whole git history, not just the tip

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- Dependency & filesystem CVE scan (incl. yarn.lock JS deps) --------------
  trivy:
    name: Trivy (vuln + secret)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
