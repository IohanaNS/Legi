services:
    # Identity Service Database
    identity-db:
        image: postgres:16-alpine
        container_name: legi-identity-db
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: legi_identity_dev
        ports:
            - "5432:5432"
        volumes:
            - identity_db_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - legi-network

    # Catalog Service Database
    catalog-db:
        image: postgres:16-alpine
        container_name: legi-catalog-db
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: legi_catalog_dev
        ports:
            - "5433:5432"
        volumes:
            - catalog_db_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - legi-network

    # Library Service Database
    library-db:
        image: postgres:16-alpine
        container_name: legi-library-db
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: legi_library_dev
        ports:
            - "5434:5432"
        volumes:
            - library_db_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - legi-network

    # Social Service Database
    social-db:
        image: postgres:16-alpine
        container_name: legi-social-db
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: legi_social_dev
        ports:
            - "5435:5432"
        volumes:
            - social_db_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - legi-network

    # Message Broker
    rabbitmq:
        image: rabbitmq:4-management-alpine
        container_name: legi-rabbitmq
        restart: unless-stopped
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            RABBITMQ_DEFAULT_USER: legi
            RABBITMQ_DEFAULT_PASS: legi_dev
            RABBITMQ_DEFAULT_VHOST: /
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - legi-network

    # Object Storage (S3-compatible) — profile images / banners
    minio:
        image: minio/minio:latest
        container_name: legi-minio
        restart: unless-stopped
        command: server /data --console-address ":9001"
        ports:
            - "9000:9000"
            - "9001:9001"
        environment:
            MINIO_ROOT_USER: ${Storage__AccessKey:-legi}
            MINIO_ROOT_PASSWORD: ${Storage__SecretKey:-legi_minio_dev}
        volumes:
            - minio_data:/data
        healthcheck:
            test: ["CMD", "mc", "ready", "local"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - legi-network

    # One-shot: create the media bucket and make it publicly readable
    minio-init:
        image: minio/mc:latest
        container_name: legi-minio-init
        depends_on:
            minio:
                condition: service_healthy
        entrypoint: >
            /bin/sh -c "
            mc alias set local http://minio:9000 ${Storage__AccessKey:-legi} ${Storage__SecretKey:-legi_minio_dev};
            mc mb --ignore-existing local/${Storage__Bucket:-legi-media};
            mc anonymous set download local/${Storage__Bucket:-legi-media};
            "
        networks:
            - legi-network

    # Identity API
    identity-api:
        build:
            context: .
            dockerfile: src/Legi.Identity.Api/Dockerfile
        container_name: legi-identity-api
        ports:
            - "127.0.0.1:5000:8080"
        environment:
            ASPNETCORE_ENVIRONMENT: Development
            ConnectionStrings__IdentityDb: Host=identity-db;Port=5432;Database=legi_identity_dev;Username=postgres;Password=postgres
            Jwt__Secret: ${Jwt__Secret}
            Jwt__Issuer: ${Jwt__Issuer:-Legi.Identity.Dev}
            Jwt__Audience: ${Jwt__Audience:-Legi.Dev}
            Jwt__AccessTokenExpirationMinutes: ${Jwt__AccessTokenExpirationMinutes:-60}
            Jwt__RefreshTokenExpirationDays: ${Jwt__RefreshTokenExpirationDays:-7}
            Turnstile__Enabled: ${Turnstile__Enabled:-false}
            Turnstile__SecretKey: ${Turnstile__SecretKey:-}
            Turnstile__SiteVerifyUrl: ${Turnstile__SiteVerifyUrl:-https://challenges.cloudflare.com/turnstile/v0/siteverify}
            Turnstile__AllowedHostnames__0: ${Turnstile__AllowedHostnames__0:-localhost}
            Turnstile__RequireForRegistration: ${Turnstile__RequireForRegistration:-true}
            Turnstile__LoginFailedAttemptsBeforeRequired: ${Turnstile__LoginFailedAttemptsBeforeRequired:-2}
            Turnstile__VerificationTimeoutSeconds: ${Turnstile__VerificationTimeoutSeconds:-5}
            RabbitMq__Host: rabbitmq
            RabbitMq__Port: 5672
            RabbitMq__VirtualHost: /
            RabbitMq__Username: legi
            RabbitMq__Password: legi_dev
            RabbitMq__ClientProvidedName: legi-identity
        depends_on:
            identity-db:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        networks:
            - legi-network

    # Catalog API
    catalog-api:
        build:
            context: .
            dockerfile: src/Legi.Catalog.Api/Dockerfile
        container_name: legi-catalog-api
        ports:
            - "5112:8080"
        environment:
            ASPNETCORE_ENVIRONMENT: Development
            ConnectionStrings__CatalogDatabase: Host=catalog-db;Port=5432;Database=legi_catalog_dev;Username=postgres;Password=postgres
            ConnectionStrings__IdentityDb: Host=identity-db;Port=5432;Database=legi_identity_dev;Username=postgres;Password=postgres
            Jwt__Secret: ${Jwt__Secret}
            Jwt__Issuer: ${Jwt__Issuer:-Legi.Identity.Dev}
            Jwt__Audience: ${Jwt__Audience:-Legi.Dev}
            Jwt__AccessTokenExpirationMinutes: ${Jwt__AccessTokenExpirationMinutes:-60}
            Jwt__RefreshTokenExpirationDays: ${Jwt__RefreshTokenExpirationDays:-7}
            ExternalServices__GoogleBooks__Enabled: ${ExternalServices__GoogleBooks__Enabled:-true}
            ExternalServices__GoogleBooks__ApiKey: ${ExternalServices__GoogleBooks__ApiKey:-}
            RabbitMq__Host: rabbitmq
            RabbitMq__Port: 5672
            RabbitMq__VirtualHost: /
            RabbitMq__Username: legi
            RabbitMq__Password: legi_dev
            RabbitMq__ClientProvidedName: legi-catalog
        depends_on:
            catalog-db:
                condition: service_healthy
            identity-db:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        networks:
            - legi-network

    # Library API
    library-api:
        build:
            context: .
            dockerfile: src/Legi.Library.Api/Dockerfile
        container_name: legi-library-api
        ports:
            - "5200:8080"
        environment:
            ASPNETCORE_ENVIRONMENT: Development
            ConnectionStrings__LibraryDatabase: Host=library-db;Port=5432;Database=legi_library_dev;Username=postgres;Password=postgres
            ConnectionStrings__IdentityDb: Host=identity-db;Port=5432;Database=legi_identity_dev;Username=postgres;Password=postgres
            Jwt__Secret: ${Jwt__Secret}
            Jwt__Issuer: ${Jwt__Issuer:-Legi.Identity.Dev}
            Jwt__Audience: ${Jwt__Audience:-Legi.Dev}
            Jwt__AccessTokenExpirationMinutes: ${Jwt__AccessTokenExpirationMinutes:-60}
            Jwt__RefreshTokenExpirationDays: ${Jwt__RefreshTokenExpirationDays:-7}
            RabbitMq__Host: rabbitmq
            RabbitMq__Port: 5672
            RabbitMq__VirtualHost: /
            RabbitMq__Username: legi
            RabbitMq__Password: legi_dev
            RabbitMq__ClientProvidedName: legi-library
        depends_on:
            library-db:
                condition: service_healthy
            identity-db:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        networks:
            - legi-network

    # Social API
    social-api:
        build:
            context: .
            dockerfile: src/Legi.Social.Api/Dockerfile
        container_name: legi-social-api
        ports:
            - "5300:8080"
        environment:
            ASPNETCORE_ENVIRONMENT: Development
            ConnectionStrings__SocialDatabase: Host=social-db;Port=5432;Database=legi_social_dev;Username=postgres;Password=postgres
            ConnectionStrings__IdentityDb: Host=identity-db;Port=5432;Database=legi_identity_dev;Username=postgres;Password=postgres
            Jwt__Secret: ${Jwt__Secret}
            Jwt__Issuer: ${Jwt__Issuer:-Legi.Identity.Dev}
            Jwt__Audience: ${Jwt__Audience:-Legi.Dev}
            Jwt__AccessTokenExpirationMinutes: ${Jwt__AccessTokenExpirationMinutes:-60}
            Jwt__RefreshTokenExpirationDays: ${Jwt__RefreshTokenExpirationDays:-7}
            RabbitMq__Host: rabbitmq
            RabbitMq__Port: 5672
            RabbitMq__VirtualHost: /
            RabbitMq__Username: legi
            RabbitMq__Password: legi_dev
            RabbitMq__ClientProvidedName: legi-social
            Storage__Endpoint: http://minio:9000
            Storage__Bucket: ${Storage__Bucket:-legi-media}
            Storage__AccessKey: ${Storage__AccessKey:-legi}
            Storage__SecretKey: ${Storage__SecretKey:-legi_minio_dev}
            Storage__PublicBasePath: /media
        depends_on:
            social-db:
                condition: service_healthy
            identity-db:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            minio:
                condition: service_healthy
        networks:
            - legi-network

    # Web Frontend
    web:
        build:
            context: web/legi-web
            dockerfile: Dockerfile
            args:
                VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
        container_name: legi-web
        ports:
            - "3000:80"
        depends_on:
            - identity-api
            - catalog-api
            - library-api
            - social-api
            - minio
        networks:
            - legi-network

volumes:
    identity_db_data:
    catalog_db_data:
    library_db_data:
    social_db_data:
    rabbitmq_data:
    minio_data:

networks:
    legi-network:
        driver: bridge
