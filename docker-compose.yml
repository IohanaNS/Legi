services:
    # Identity Service Database
    identity-db:
        image: postgres:16-alpine
        container_name: legi-identity-db
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: legi_identity_dev
        ports:
            - "5432:5432"
        volumes:
            - identity_db_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - legi-network
    
    # Catalog Service Database
    catalog-db:
        image: postgres:16-alpine
        container_name: legi-catalog-db
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: legi_catalog_dev
        ports:
            - "5433:5432"
        volumes:
            - catalog_db_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - legi-network
    
