server {
    # 8080, not 80: the unprivileged nginx image runs as a non-root user that cannot
    # bind privileged ports. The compose port mapping fronts this.
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 valid=10s ipv6=off;

    set $identity_api identity-api:8080;
    set $catalog_api catalog-api:8080;
    set $library_api library-api:8080;
    set $social_api social-api:8080;
    set $minio_upstream minio:9000;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' https://challenges.cloudflare.com https://accounts.google.com/gsi/client; frame-src https://challenges.cloudflare.com https://accounts.google.com/gsi/; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com/gsi/style; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://accounts.google.com/gsi/" always;

    # The largest accepted file is a 5 MB banner; allow multipart overhead.
    client_max_body_size 6m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # User-uploaded media (avatars, banners) served from the MinIO bucket.
    # Resolve minio via the variable + resolver (not a static upstream), so a MinIO
    # container recreate (new IP) doesn't leave this proxy dialing a stale address.
    location /media/ {
        rewrite ^/media/(.*)$ /legi-media/$1 break;
        proxy_pass http://$minio_upstream;
        proxy_set_header Host $host;
        # Images are immutable (content-hashed keys) — let the browser cache them.
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Owned book covers served from the separate MinIO bucket.
    location /covers/ {
        rewrite ^/covers/(.*)$ /legi-covers/$1 break;
        proxy_pass http://$minio_upstream;
        proxy_set_header Host $host;
        # Covers are immutable (guid-keyed) — let the browser cache them.
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /api/v1/identity {
        proxy_pass http://$identity_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # API responses (incl. any redirect) must never be cached by the browser —
        # a cached 301 once poisoned the SPA, replaying to a port-stripped URL.
        add_header Cache-Control "no-store" always;
    }

    location /api/v1/catalog {
        proxy_pass http://$catalog_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # API responses (incl. any redirect) must never be cached by the browser —
        # a cached 301 once poisoned the SPA, replaying to a port-stripped URL.
        add_header Cache-Control "no-store" always;
    }

    location /api/v1/library {
        proxy_pass http://$library_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # API responses (incl. any redirect) must never be cached by the browser —
        # a cached 301 once poisoned the SPA, replaying to a port-stripped URL.
        add_header Cache-Control "no-store" always;
    }

    location /api/v1/social {
        proxy_pass http://$social_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # API responses (incl. any redirect) must never be cached by the browser —
        # a cached 301 once poisoned the SPA, replaying to a port-stripped URL.
        add_header Cache-Control "no-store" always;
    }
}
