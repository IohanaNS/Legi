server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # The largest accepted file is a 5 MB banner; allow multipart overhead.
    client_max_body_size 6m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # User-uploaded media (avatars, banners) served from the MinIO bucket.
    location /media/ {
        proxy_pass http://minio:9000/legi-media/;
        proxy_set_header Host $host;
        # Images are immutable (content-hashed keys) — let the browser cache them.
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /api/v1/identity {
        proxy_pass http://identity-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # API responses (incl. any redirect) must never be cached by the browser —
        # a cached 301 once poisoned the SPA, replaying to a port-stripped URL.
        add_header Cache-Control "no-store" always;
    }

    location /api/v1/catalog {
        proxy_pass http://catalog-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # API responses (incl. any redirect) must never be cached by the browser —
        # a cached 301 once poisoned the SPA, replaying to a port-stripped URL.
        add_header Cache-Control "no-store" always;
    }

    location /api/v1/library {
        proxy_pass http://library-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # API responses (incl. any redirect) must never be cached by the browser —
        # a cached 301 once poisoned the SPA, replaying to a port-stripped URL.
        add_header Cache-Control "no-store" always;
    }

    location /api/v1/social {
        proxy_pass http://social-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # API responses (incl. any redirect) must never be cached by the browser —
        # a cached 301 once poisoned the SPA, replaying to a port-stripped URL.
        add_header Cache-Control "no-store" always;
    }
}
